services:
  # Backend API service
  - type: web
    name: autoverse-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    scaling:
      minInstances: 1
      maxInstances: 3

  # Frontend static site
  - type: web
    name: autoverse-frontend
    runtime: static
    rootDir: frontend
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /index.html
        name: Cache-Control
        value: no-cache
